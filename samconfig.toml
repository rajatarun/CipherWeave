# SAM CLI default configuration for CipherWeave
# Override any value with --parameter-overrides or environment-specific profiles.
# The deploy workflow populates VpcId, SubnetIds, and MemgraphSecurityGroupId
# dynamically from the Memgraph EC2 instance (i-04b2d0f387d2c7d53).

version = 0.1

[default]
[default.global.parameters]
stack_name = "cipherweave-prod"
region     = "us-east-1"

[default.build.parameters]
use_container = false       # Pure-Python deps — no container needed
cached        = true

[default.deploy.parameters]
stack_name              = "cipherweave-prod"
s3_prefix               = "cipherweave"
region                  = "us-east-1"
confirm_changeset       = false
fail_on_empty_changeset = false
capabilities            = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
# Parameter defaults — VPC values injected by GitHub Actions workflow
parameter_overrides     = [
    "Stage=prod",
    "MemgraphHost=172.31.12.134",
    "MemgraphPort=7687",
    "KMSKeyArn=arn:aws:kms:us-east-1:239571291755:key/49eac3db-1f3a-4c91-98ac-61ae722dcaff",
    "UseLocalKMS=false",
    "LogLevel=INFO",
]

[staging]
[staging.deploy.parameters]
stack_name = "cipherweave-staging"
parameter_overrides = [
    "Stage=staging",
    "MemgraphHost=172.31.12.134",
    "UseLocalKMS=false",
    "LogLevel=DEBUG",
]
