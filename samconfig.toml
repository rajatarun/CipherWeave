# SAM CLI default configuration for CipherWeave
#
# MemgraphHost, KMSKeyArn, VpcId, SubnetIds, and MemgraphSecurityGroupId are
# intentionally absent here — the GitHub Actions workflow reads them live from
# the contextweave-rag-prod CloudFormation stack and passes them via
# --parameter-overrides at deploy time.
#
# For local sam deploy (rare), export the values first:
#   export MEMGRAPH_HOST=$(aws cloudformation describe-stacks \
#     --stack-name contextweave-rag-prod \
#     --query "Stacks[0].Outputs[?OutputKey=='MemgraphPrivateIP'].OutputValue" \
#     --output text)
#   sam deploy --parameter-overrides "MemgraphHost=$MEMGRAPH_HOST ..."

version = 0.1

[default]
[default.global.parameters]
stack_name = "cipherweave-prod"
region     = "us-east-1"

[default.build.parameters]
use_container = false   # Pure-Python deps — no container needed
cached        = true

[default.deploy.parameters]
stack_name              = "cipherweave-prod"
s3_prefix               = "cipherweave"
region                  = "us-east-1"
confirm_changeset       = false
fail_on_empty_changeset = false
capabilities            = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
# Only stable, non-environment-specific defaults here.
# MemgraphHost, KMSKeyArn, VpcId, SubnetIds, MemgraphSecurityGroupId
# are injected by the deploy workflow from contextweave-rag-prod outputs.
parameter_overrides = [
    "Stage=prod",
    "MemgraphPort=7687",
    "UseLocalKMS=false",
    "LogLevel=INFO",
]

[staging]
[staging.deploy.parameters]
stack_name = "cipherweave-staging"
parameter_overrides = [
    "Stage=staging",
    "MemgraphPort=7687",
    "UseLocalKMS=false",
    "LogLevel=DEBUG",
]
