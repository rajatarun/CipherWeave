version: "3.8"

services:
  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: cipherweave-memgraph
    ports:
      - "7687:7687"   # Bolt protocol
      - "7444:7444"   # HTTP monitoring
      - "3000:3000"   # Memgraph Lab UI
    environment:
      MEMGRAPH_TELEMETRY_ENABLED: "false"
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7687"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memgraph_data:
  memgraph_log:
