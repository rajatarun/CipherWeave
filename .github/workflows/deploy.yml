name: Deploy CipherWeave

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: false
        default: prod
        type: choice
        options: [prod, staging]
      skip_seed:
        description: "Skip Memgraph seeding step"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# ── OIDC permissions ────────────────────────────────────────────────────────
permissions:
  id-token: write   # Required for OIDC AssumeRoleWithWebIdentity
  contents: read

# ── Concurrency guard ───────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: ${{ github.event.inputs.stage || 'prod' }}
  STACK_NAME: cipherweave-${{ github.event.inputs.stage || 'prod' }}
  SOURCE_STACK: contextweave-rag-prod   # Stack whose outputs we read at runtime

jobs:
  # ── Build & Deploy ──────────────────────────────────────────────────────
  deploy:
    name: SAM Build & Deploy
    runs-on: ubuntu-latest
    outputs:
      api_endpoint:      ${{ steps.cw_outputs.outputs.api_endpoint }}
      seed_function_arn: ${{ steps.cw_outputs.outputs.seed_function_arn }}
      memgraph_host:     ${{ steps.source_stack.outputs.memgraph_host }}
      memgraph_instance: ${{ steps.source_stack.outputs.memgraph_instance_id }}
      kms_key_arn:       ${{ steps.source_stack.outputs.kms_key_arn }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. OIDC → AWS credentials ────────────────────────────────────────
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: cipherweave-deploy-${{ github.run_id }}

      # ── 3. Read all required values from the source CFN stack ────────────
      # Single describe-stacks call; every downstream step references these outputs.
      # No values from the screenshot are hardcoded here — they all come from CFN.
      - name: Read contextweave-rag-prod stack outputs
        id: source_stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$SOURCE_STACK" \
            --query "Stacks[0].Outputs" \
            --output json)

          echo "All outputs from $SOURCE_STACK:"
          echo "$OUTPUTS" | jq -r '.[] | "\(.OutputKey) = \(.OutputValue)"'

          get() { echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }

          MEMGRAPH_INSTANCE_ID=$(get MemgraphInstanceId)
          MEMGRAPH_HOST=$(get MemgraphPrivateIP)
          KMS_KEY_ARN=$(get KMSKeyArn)

          # Try the confirmed key first, then fallbacks
          ARTIFACT_BUCKET=$(get ArtifactsBucketName)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get ArtifactBucket)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get ArtifactsBucket)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get SAMArtifactsBucket)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get SamArtifactsBucket)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get DeploymentBucket)
          [ -z "$ARTIFACT_BUCKET" ] && ARTIFACT_BUCKET=$(get S3BucketName)

          echo "memgraph_instance_id=$MEMGRAPH_INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "memgraph_host=$MEMGRAPH_HOST"               >> "$GITHUB_OUTPUT"
          echo "kms_key_arn=$KMS_KEY_ARN"                   >> "$GITHUB_OUTPUT"
          echo "artifact_bucket=$ARTIFACT_BUCKET"           >> "$GITHUB_OUTPUT"

          echo "✅ MemgraphInstance: $MEMGRAPH_INSTANCE_ID"
          echo "✅ MemgraphHost:     $MEMGRAPH_HOST"
          echo "✅ KMSKeyArn:        ${KMS_KEY_ARN:0:50}..."
          echo "✅ ArtifactBucket:   ${ARTIFACT_BUCKET:-'(not found — will use --resolve-s3)'}"

      # ── 4. Resolve VPC/Subnet/SG from the Memgraph EC2 instance ─────────
      # Uses the instance ID fetched from CFN — not hardcoded.
      - name: Resolve VPC parameters from Memgraph EC2 instance
        id: vpc
        run: |
          INSTANCE_JSON=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.source_stack.outputs.memgraph_instance_id }}" \
            --query 'Reservations[0].Instances[0]' \
            --output json)

          VPC_ID=$(echo "$INSTANCE_JSON"    | jq -r '.VpcId')
          SUBNET_ID=$(echo "$INSTANCE_JSON" | jq -r '.SubnetId')
          MEMGRAPH_SG=$(echo "$INSTANCE_JSON" | jq -r '.SecurityGroups[0].GroupId')

          echo "vpc_id=$VPC_ID"         >> "$GITHUB_OUTPUT"
          echo "subnet_id=$SUBNET_ID"   >> "$GITHUB_OUTPUT"
          echo "memgraph_sg=$MEMGRAPH_SG" >> "$GITHUB_OUTPUT"

          echo "✅ VPC=$VPC_ID  Subnet=$SUBNET_ID  MemgraphSG=$MEMGRAPH_SG"

      # ── 5. Python + SAM CLI ──────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── 6. SAM Build ─────────────────────────────────────────────────────
      - name: SAM Build
        run: sam build --config-file samconfig.toml --config-env default

      # ── 7. SAM Deploy ────────────────────────────────────────────────────
      - name: SAM Deploy
        run: |
          S3_BUCKET="${{ steps.source_stack.outputs.artifact_bucket }}"
          if [ -n "$S3_BUCKET" ]; then
            BUCKET_ARGS="--s3-bucket $S3_BUCKET"
            echo "✅ Using artifact bucket: $S3_BUCKET"
          else
            echo "⚠️  No artifact bucket found in CFN outputs — falling back to --resolve-s3"
            BUCKET_ARGS="--resolve-s3"
          fi

          sam deploy \
            --config-file samconfig.toml \
            --config-env default \
            --stack-name "$STACK_NAME" \
            $BUCKET_ARGS \
            --s3-prefix "cipherweave/$STAGE" \
            --region "$AWS_REGION" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              "Stage=$STAGE" \
              "MemgraphHost=${{ steps.source_stack.outputs.memgraph_host }}" \
              "MemgraphPort=7687" \
              "KMSKeyArn=${{ steps.source_stack.outputs.kms_key_arn }}" \
              "VpcId=${{ steps.vpc.outputs.vpc_id }}" \
              "SubnetIds=${{ steps.vpc.outputs.subnet_id }}" \
              "MemgraphSecurityGroupId=${{ steps.vpc.outputs.memgraph_sg }}" \
              "UseLocalKMS=false" \
              "LogLevel=INFO"

      # ── 8. Read CipherWeave stack outputs ────────────────────────────────
      - name: Read CipherWeave stack outputs
        id: cw_outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --output json)

          get() { echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }

          echo "api_endpoint=$(get CipherWeaveApiEndpoint)"     >> "$GITHUB_OUTPUT"
          echo "seed_function_arn=$(get SeedGraphFunctionArn)"  >> "$GITHUB_OUTPUT"

          echo "✅ API: $(get CipherWeaveApiEndpoint)"
          echo "✅ SeedFn: $(get SeedGraphFunctionArn)"

      # ── 9. Deployment summary ────────────────────────────────────────────
      - name: Deployment summary
        run: |
          KMS="${{ steps.source_stack.outputs.kms_key_arn }}"
          echo "## CipherWeave Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stack | \`$STACK_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | \`$STAGE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`$AWS_REGION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Endpoint | \`${{ steps.cw_outputs.outputs.api_endpoint }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Memgraph | \`${{ steps.source_stack.outputs.memgraph_host }}:7687\` (instance \`${{ steps.source_stack.outputs.memgraph_instance_id }}\`) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VPC | \`${{ steps.vpc.outputs.vpc_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| KMS Key | \`...${KMS: -12}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Stack | \`$SOURCE_STACK\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Seed Memgraph Graph ─────────────────────────────────────────────────
  seed-graph:
    name: Seed Memgraph Topology
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.inputs.skip_seed != 'true' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: cipherweave-seed-${{ github.run_id }}

      # The seed Lambda runs inside the VPC and reaches Memgraph on the private IP.
      # GitHub runners have no VPC access — Lambda invocation is the only path in.
      - name: Invoke SeedGraph Lambda
        run: |
          SEED_ARN="${{ needs.deploy.outputs.seed_function_arn }}"
          if [ -z "$SEED_ARN" ]; then
            echo "❌ seed_function_arn is empty — deploy job did not output it"
            exit 1
          fi
          echo "Invoking: $SEED_ARN"
          echo "Memgraph target: ${{ needs.deploy.outputs.memgraph_host }}:7687"

          # AWS CLI v2 requires --cli-binary-format raw-in-base64-out for raw JSON payloads
          aws lambda invoke \
            --function-name "$SEED_ARN" \
            --payload '{"RequestType":"Create"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            --query 'LogResult' \
            --output text \
            /tmp/seed_response.json | base64 -d || true

          echo ""
          echo "=== Seed Lambda Response ==="
          if [ ! -f /tmp/seed_response.json ]; then
            echo "❌ No response file — lambda invoke failed"
            exit 1
          fi
          cat /tmp/seed_response.json | jq . || cat /tmp/seed_response.json

          STATUS=$(cat /tmp/seed_response.json | jq -r '.status // "unknown"')
          if [ "$STATUS" = "error" ]; then
            echo "❌ Seed graph failed"
            exit 1
          fi
          echo "✅ Memgraph topology seeded (status=$STATUS)"

      - name: Seed summary
        run: |
          echo "## Memgraph Seed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Memgraph: \`${{ needs.deploy.outputs.memgraph_host }}:7687\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/seed_response.json ]; then
            cat /tmp/seed_response.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_response_file"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Smoke Test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test MCP Endpoint
    runs-on: ubuntu-latest
    needs: [deploy, seed-graph]

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: cipherweave-smoke-${{ github.run_id }}

      - name: Smoke test via Lambda invoke
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CipherWeaveFunctionArn'].OutputValue" \
            --output text)

          echo "Testing: $FUNCTION_ARN"

          PAYLOAD=$(cat <<'EOF'
          {
            "version": "2.0",
            "routeKey": "POST /mcp",
            "rawPath": "/mcp",
            "rawQueryString": "",
            "headers": {"content-type": "application/json", "x-agent-id": "agent-analytics"},
            "requestContext": {"http": {"method": "POST", "path": "/mcp", "protocol": "HTTP/1.1"}, "stage": "$default"},
            "body": "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"smoke-test\",\"version\":\"0.1\"}}}",
            "isBase64Encoded": false
          }
          EOF
          )

          aws lambda invoke \
            --function-name "$FUNCTION_ARN" \
            --payload "$PAYLOAD" \
            /tmp/smoke_response.json 2>&1 || true

          echo "=== Smoke Test Response ==="
          cat /tmp/smoke_response.json | jq . || cat /tmp/smoke_response.json
          echo "✅ Smoke test complete"

      - name: Smoke test summary
        run: |
          echo "## Smoke Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "API Endpoint: \`${{ needs.deploy.outputs.api_endpoint }}\`" >> "$GITHUB_STEP_SUMMARY"
